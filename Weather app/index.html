<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <!-- Preconnect to Google Fonts for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Import Poppins font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Link to external CSS stylesheet -->
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for icons (magnifying glass, wind, water drops) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="icon" href="">
</head>
<body>
    
    <!-- Main Application Container (Glassmorphism card) -->
    <div class="container">
        
        <!-- Search Bar Section -->
        <div class="search">
            <input type="search" placeholder="Enter city name" spellcheck="false" class="input-box">
            <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <!-- 404 Error State (Hidden by default, shown if city is invalid) -->
        <div class="not-found">
            <img src="images/404.png" alt="Not Found">
            <p>Oops! Invalid location :/</p>
        </div>

        <!-- Weather Data Section (Hidden by default, shown when data successfully loads) -->
        <div class="weather-body">
            
            <!-- Dynamic weather icon (changes based on weather condition) -->
            <img src="images/cloud.png" alt="Weather condition" class="weather-icon">

            <!-- Temperature and Weather Description -->
            <div class="weather-box">
                <p class="temp">0 <sup>°C</sup></p>
                <p class="desc">Light Rain</p>
            </div>
            
            <!-- Additional Details (Humidity & Wind Speed) -->
            <div class="weather-details">
                
                <!-- Humidity Section -->
                <div class="humidity">
                    <i class="fa-solid fa-water"></i>
                    <div class="text">
                        <span id="humidity">45%</span>
                        <p>Humidity</p>
                    </div>
                </div>

                <!-- Wind Speed Section -->
                <div class="wind">
                    <i class="fa-solid fa-wind"></i>
                    <div class="text">
                        <span id="wind-speed">12 Km/h</span>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Link to external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
